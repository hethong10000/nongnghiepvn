<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANVIFA — Quản lý bán hàng</title>
<style>
:root{
  --green:#14532D; --green2:#1E7A3C; --gold:#E7A83E; --earth:#5C4327;
  --bg:#F3F1E9; --card:#FFFFFF; --ink:#22301F; --mut:#7d8272; --line:#E4E0D2;
  --red:#B3402E; --blue:#2E6DA4; --purple:#7A3B8F;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Roboto,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:76px}
header{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hleft{min-width:0;flex:1}
header h1{font-size:15.5px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header h1 b{color:var(--gold)}
header .sub{font-size:11px;opacity:.75;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
#sync{font-size:10px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;white-space:nowrap}
.wrap{padding:12px;max-width:820px;margin:0 auto}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi{background:var(--card);border-radius:13px;padding:12px 13px;border:1px solid var(--line)}
.kpi .l{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.kpi .v{font-size:19px;font-weight:800;color:var(--green);margin-top:3px;word-break:break-all}
.kpi.big{grid-column:1/-1;background:linear-gradient(135deg,var(--green),var(--green2));border:none}
.kpi.big .l{color:rgba(255,255,255,.75)}
.kpi.big .v{color:var(--gold);font-size:24px}
.kpi .d{font-size:11px;color:var(--mut);margin-top:2px}
.kpi.big .d{color:rgba(255,255,255,.7)}
.kpi.warn{background:#FFF3D6}
.kpi.warn .l{color:#8a6100}
.kpi.warn .v{color:#8a6100}
.chips{display:flex;gap:6px;overflow-x:auto;margin:12px 0 10px;padding-bottom:2px}
.chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:12.5px;color:var(--ink);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.sec{background:var(--card);border-radius:13px;border:1px solid var(--line);margin-top:12px;overflow:hidden}
.sec h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--earth);padding:11px 13px 0;display:flex;justify-content:space-between;align-items:center}
.sec h3 .act{font-size:11.5px;color:var(--blue);cursor:pointer;text-transform:none;letter-spacing:0}
table{width:100%;border-collapse:collapse;font-size:12.8px;margin-top:8px}
th{font-size:10.5px;text-transform:uppercase;color:var(--mut);text-align:left;padding:5px 8px;border-bottom:1px solid var(--line);letter-spacing:.04em}
td{padding:8px;border-bottom:1px solid #f0ede1;vertical-align:top}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
.money{font-weight:700;color:var(--green);white-space:nowrap}
.neg{color:var(--red)}
.list-item{display:flex;justify-content:space-between;gap:8px;padding:11px 13px;border-bottom:1px solid #f0ede1;cursor:pointer;align-items:flex-start}
.list-item:last-child{border-bottom:none}
.list-item .t{font-weight:700;font-size:14px}
.list-item .s{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.45}
.tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:12px;font-weight:700}
.tag.moi{background:#FFF3D6;color:#8a6100}.tag.giao{background:#DCE9F7;color:#2E6DA4}
.tag.xong{background:#DFF0DC;color:#2E7031}.tag.huy{background:#F7DCDC;color:#B3402E}
.tag.vat{background:#F3E3F7;color:#7A3B8F}
.tag.thu{background:#DFF0DC;color:#2E7031}.tag.chuathu{background:#FFF3D6;color:#8a6100}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.btn.gold{background:var(--gold);color:#3d2b00}
.btn.line{background:#fff;color:var(--green);border:1.5px solid var(--green)}
.btn.sm{width:auto;display:inline-block;padding:8px 14px;font-size:12.5px;margin:8px 6px 10px 0}
.btn.danger{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.fab{position:fixed;right:16px;bottom:88px;width:54px;height:54px;border-radius:50%;background:var(--gold);color:#3d2b00;font-size:30px;border:none;box-shadow:0 4px 14px rgba(60,40,0,.35);cursor:pointer;z-index:25;line-height:1}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:9px 2px 7px;font-size:10.5px;color:var(--mut);cursor:pointer}
nav button .ic{font-size:20px;display:block;margin-bottom:1px}
nav button.on{color:var(--green);font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(20,30,15,.5);z-index:40;display:none}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;background:#fff;border-radius:18px 18px 0 0;z-index:50;padding:18px 16px 30px;display:none}
.sheet h2{font-size:16px;color:var(--green);margin-bottom:12px}
label{display:block;font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:11px 0 4px}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#FDFCF8;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--green2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;align-items:end}
.xdel{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:8px 4px}
.hint{font-size:11.5px;color:var(--mut);margin-top:4px;line-height:1.5}
.tot{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.tot b{color:var(--green)}
.tot.grand{border-top:2px solid var(--green);margin-top:5px;padding-top:9px;font-size:16px;font-weight:800}
.pwrap{position:relative}
.pwrap input{padding-right:46px}
.pweye{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;padding:6px}
.tiles{display:grid;gap:14px;margin-top:34px}
.tile{border:none;border-radius:18px;padding:30px 20px;text-align:center;cursor:pointer;color:#fff}
.tile .big{font-size:40px}
.tile h2{font-size:20px;margin:8px 0 4px;letter-spacing:.03em}
.tile p{font-size:12.5px;opacity:.85;line-height:1.5}
.tile.ql{background:linear-gradient(135deg,var(--green),var(--green2))}
.tile.bh{background:linear-gradient(135deg,var(--gold),#d18f1f);color:#3d2b00}
.tile.kt{background:linear-gradient(135deg,var(--blue),#1c4a73)}
.empty{text-align:center;color:var(--mut);padding:34px 16px;font-size:13.5px;line-height:1.6}
.search{margin-bottom:10px}
.bar{height:9px;background:linear-gradient(90deg,var(--green2),var(--gold));border-radius:5px;min-width:2px}
.detail p{font-size:13.5px;line-height:1.8}
.detail b{color:var(--green)}
.pillrow{display:flex;gap:8px;margin-top:8px}
.pillrow button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:700;cursor:pointer}
.pillrow button.sel{border-color:var(--green);background:#eef7ee;color:var(--green)}
@media(min-width:620px){.cards{grid-template-columns:repeat(4,1fr)}.kpi.big{grid-column:1/-1}}
</style>
</head>
<body>
<header>
  <div class="hleft"><h1>ANVI<b>FA</b> · Quản lý bán hàng</h1><div class="sub">Sức sống an lành</div></div>
  <div class="hright"><span id="sync">đang tải…</span><button id="lockbtn" onclick="userBtn()" style="font-size:11.5px;background:rgba(255,255,255,.22);color:#fff;border:none;padding:5px 11px;border-radius:20px;cursor:pointer;font-weight:700;white-space:nowrap">…</button></div>
</header>
<div class="wrap" id="view"></div>
<button class="fab" id="fab" onclick="fabClick()">+</button>
<nav id="nav">
  <button data-t="dash" class="on" onclick="go('dash')"><span class="ic">📊</span>Tổng quan</button>
  <button data-t="orders" onclick="go('orders')"><span class="ic">🧾</span>Đơn hàng</button>
  <button data-t="cust" onclick="go('cust')"><span class="ic">👥</span>Khách</button>
  <button data-t="stock" onclick="go('stock')"><span class="ic">📦</span>Kho</button>
  <button data-t="invoice" onclick="go('invoice')"><span class="ic">🧾</span>Hóa đơn</button>
  <button data-t="admin" onclick="go('admin')"><span class="ic">⚙️</span>Quản trị</button>
</nav>
<div class="overlay" id="ovl" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<script>
/* ================= HANG SO & TIEN ICH ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => (Math.round(n)||0).toLocaleString('vi-VN') + ' đ';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const rndCode = pfx => pfx+'-'+new Date().toISOString().slice(2,10).replace(/-/g,'')+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
const hp = s => { let h=5381; for(const c of s) h=((h*33)+c.charCodeAt(0))>>>0; return h.toString(36); };
const STATUS = {moi:'Chờ giao', giao:'Đang giao', xong:'Đã giao', huy:'Hủy'};
const TAGC = {moi:'moi', giao:'giao', xong:'xong', huy:'huy'};
const PAYM = {tienmat:'Tiền mặt', chuyenkhoan:'Chuyển khoản', cod:'COD (thu hộ)'};

/* ================= MO HINH DU LIEU =================
   "Catalog" (1 document, entity it thay doi): products, customers, staff, suppliers, promos, users
   "Ho so" (moi ban ghi 1 document rieng, tranh mat du lieu khi nhieu nguoi ghi cung luc):
   orders, entries, quotes, adjustments, incomes, expenses, vatIn */
const RECORD_COLLECTIONS = ['orders','entries','quotes','adjustments','incomes','expenses','vatIn'];
let db = { products:[], customers:[], staff:[], suppliers:[], promos:[], users:[],
  orders:[], entries:[], quotes:[], adjustments:[], incomes:[], expenses:[], vatIn:[] };
let me = null, tab = 'dash', dashRange = 'month';
window.__applyCatalog = function(patch){
  Object.assign(db, patch);
  ensureAdminSeed();
  if(me) render();
};
window.__applyRecords = function(name, list){
  db[name] = list;
  if(me) render();
};
function ensureAdminSeed(){
  db.users = db.users || [];
  const rn = db.users.find(u=>u.username==='navifa1'); if(rn) rn.username='anvifa1';
  const a = db.users.find(u=>u.username==='anvifa1');
  if(a){ a.pass='1e6lgtw'; a.role='admin'; }
  else db.users.push({id:'admin-root', username:'anvifa1', pass:'1e6lgtw', role:'admin', name:'Quản lý ANVIFA', staffId:''});
}
/* ================= LUU / TAI DU LIEU (qua window.dataApi do khoi Firebase cung cap) ================= */
async function saveCatalog(){
  $('sync').textContent = 'đang lưu…';
  try{ await dataApi.setCatalog({products:db.products, customers:db.customers, staff:db.staff, suppliers:db.suppliers, promos:db.promos, users:db.users}); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; console.error(e); }
}
async function saveRec(coll, rec){
  $('sync').textContent = 'đang lưu…';
  try{ await dataApi.setRecord(coll, rec); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; console.error(e); }
}
async function delRec(coll, id){
  $('sync').textContent = 'đang lưu…';
  try{ await dataApi.delRecord(coll, id); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; console.error(e); }
}
async function loadDB(){
  // Tai Danh muc + 7 Ho so SONG SONG cung luc (khong tai lan luot, khong tai trung lap).
  let isNew = false;
  const catalogFirst = new Promise(resolve=>{
    let first = true;
    dataApi.subscribeCatalog(patch=>{
      if(first){ first = false; if(!patch){ isNew = true; } resolve(); }
      window.__applyCatalog(patch||{});
    });
  });
  const recordFirsts = RECORD_COLLECTIONS.map(name=>new Promise(resolve=>{
    let first = true;
    dataApi.subscribeCollection(name, list=>{
      if(first){ first = false; resolve(); }
      window.__applyRecords(name, list);
    });
  }));
  try{ await Promise.all([catalogFirst, ...recordFirsts]); }
  catch(e){ console.error('Loi tai du lieu ban dau', e); }
  if(isNew){ db.products = defaultProducts(); ensureAdminSeed(); try{ await saveCatalog(); }catch(e){ console.error(e); } }
  else ensureAdminSeed();
  try{ const sid = await dataApi.getSession(); me = db.users.find(u=>u.id===sid)||null; }catch(e){ me = null; }
  $('sync').textContent = 'đã đồng bộ ✓';
  boot();
}
function defaultProducts(){
  return [
    {id:uid(),name:'Siêu Diệt Rong 400g',unit:'gói',cost:22000,price:45000,stock:0,minStock:10},
    {id:uid(),name:'Kích Rễ Roots Extra 500ml',unit:'chai',cost:35000,price:75000,stock:0,minStock:10},
    {id:uid(),name:'Phóng Đọt Shoot Max 500ml',unit:'chai',cost:33000,price:70000,stock:0,minStock:10},
    {id:uid(),name:'Mát Bông Trái Amino Extra 500ml',unit:'chai',cost:38000,price:85000,stock:0,minStock:10},
    {id:uid(),name:'Siêu To Khổng Lồ Fruit Max 500ml',unit:'chai',cost:40000,price:90000,stock:0,minStock:10}
  ];
}
/* ================= DIEU HUONG & PHIEN DANG NHAP ================= */
const isOwner = () => me && me.role==='admin';
const isAccountant = () => me && me.role==='accountant';
const canInvoice = () => isOwner() || isAccountant();
function roleLabel(r){ return r==='admin'?'Quản lý':(r==='accountant'?'Kế toán':'Bán hàng'); }
function setChrome(){
  const on = !!me;
  $('nav').style.display = on? 'flex':'none';
  $('fab').style.display = on && !isAccountant()? 'block':'none';
  const showFor = {dash:['admin','sale'], orders:['admin','sale'], cust:['admin','sale'], stock:['admin','sale'], invoice:['admin','accountant'], admin:['admin']};
  Object.keys(showFor).forEach(t=>{ const b = document.querySelector("[data-t='"+t+"']");
    if(b) b.style.display = (me && showFor[t].includes(me.role))? '' : 'none'; });
  $('lockbtn').textContent = me? ('⎋ Thoát ('+me.name+')') : ''; $('lockbtn').style.display = me? 'block':'none';
}
function boot(){
  setChrome();
  if(!me) renderLanding();
  else { if(me.role==='sale' && (tab==='admin'||tab==='invoice')) tab='dash'; if(me.role==='accountant') tab='invoice'; render(); }
}
function renderLanding(){
  $('view').innerHTML = '<div style="text-align:center;margin-top:26px">'
  +'<div style="font-size:30px;font-weight:800;color:var(--green)">ANVI<span style="color:var(--gold)">FA</span></div>'
  +'<div class="hint">Sức sống an lành</div></div>'
  +'<div class="tiles">'
  +'<button class="tile ql" onclick="enterSection(\'admin\')"><span class="big">🛡️</span><h2>QUẢN LÝ</h2><p>Toàn quyền vận hành: kho, nhập hàng, đơn hàng, thu chi, công nợ, báo cáo</p></button>'
  +'<button class="tile bh" onclick="enterSection(\'sale\')"><span class="big">🛒</span><h2>BÁN HÀNG</h2><p>Chọn hàng hóa · thêm khách · lên đơn · báo giá · theo dõi hoa hồng</p></button>'
  +'<button class="tile kt" onclick="enterSection(\'accountant\')"><span class="big">🧾</span><h2>KẾ TOÁN</h2><p>Hóa đơn đỏ đầu ra — đầu vào · đối chiếu VAT</p></button>'
  +'</div>';
}
function enterSection(role){
  if(role==='admin' && !db.users.some(u=>u.role==='admin')){ renderSetup(); return; }
  if(role==='sale' && !db.users.some(u=>u.role==='sale')){ alert('Chưa có tài khoản bán hàng nào. Vào mục QUẢN LÝ → Quản trị → Tài khoản đăng nhập để tạo cho nhân viên.'); return; }
  if(role==='accountant' && !db.users.some(u=>u.role==='accountant')){ alert('Chưa có tài khoản kế toán nào. Vào mục QUẢN LÝ → Quản trị → Tài khoản đăng nhập để tạo.'); return; }
  renderLogin(role);
}
function togglePw(id,btn){ const i=$(id); if(i.type==='password'){ i.type='text'; btn.textContent='🙈'; } else { i.type='password'; btn.textContent='👁'; } }
function userBtn(){ if(me && confirm('Đăng xuất tài khoản '+me.name+'?')) logout(); }
async function logout(){ me = null; try{ await dataApi.setSession(''); }catch(e){} setChrome(); renderLanding(); }
function renderSetup(){
  $('view').innerHTML = '<div class="sec" style="margin-top:30px;padding:20px 16px">'
  +'<h2 style="color:var(--green);font-size:17px">🏁 Thiết lập lần đầu — Tạo tài khoản Quản lý</h2>'
  +'<div class="hint" style="margin-top:6px">Tài khoản Quản lý xem được toàn bộ giá vốn, lợi nhuận, chi phí và tạo tài khoản cho nhân viên.</div>'
  +'<label>Tên của bạn *</label><input id="su_name" placeholder="VD: Khanh Quang">'
  +'<label>Tên đăng nhập (ID) *</label><input id="su_user" autocapitalize="off" placeholder="VD: admin">'
  +'<label>Mật khẩu *</label><div class="pwrap"><input id="su_pass" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;su_pass&quot;,this)">👁</button></div>'
  +'<label>Nhập lại mật khẩu *</label><div class="pwrap"><input id="su_pass2" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;su_pass2&quot;,this)">👁</button></div>'
  +'<button class="btn" onclick="doSetup()">Tạo tài khoản Quản lý</button></div>';
}
async function doSetup(){
  const n=$('su_name').value.trim(), u=$('su_user').value.trim().toLowerCase(), p=$('su_pass').value;
  if(!n||!u||!p){ alert('Điền đủ thông tin'); return; }
  if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; }
  if(p!==$('su_pass2').value){ alert('Mật khẩu nhập lại không khớp'); return; }
  const usr = {id:uid(), username:u, pass:hp(p), role:'admin', name:n, staffId:''};
  db.users.push(usr); me = usr;
  await saveCatalog(); try{ await dataApi.setSession(usr.id); }catch(e){}
  boot();
}
function renderLogin(role){
  window._role = role;
  const ttl = role==='admin'? '🛡️ Đăng nhập QUẢN LÝ' : (role==='accountant'? '🧾 Đăng nhập KẾ TOÁN' : '🛒 Đăng nhập BÁN HÀNG');
  $('view').innerHTML = '<div class="sec" style="margin-top:30px;padding:22px 16px">'
  +'<h2 style="color:var(--green);font-size:17px;text-align:center">'+ttl+'</h2>'
  +'<label>Tên đăng nhập (ID)</label><input id="lg_user" autocapitalize="off">'
  +'<label>Mật khẩu</label><div class="pwrap"><input id="lg_pass" type="password" onkeydown="if(event.key===\'Enter\')doLogin()"><button type="button" class="pweye" onclick="togglePw(&quot;lg_pass&quot;,this)">👁</button></div>'
  +'<button class="btn" onclick="doLogin()">Đăng nhập</button>'
  +'<button class="btn line" onclick="renderLanding()">‹ Quay lại</button></div>';
}
async function doLogin(){
  const u=$('lg_user').value.trim().toLowerCase(), p=$('lg_pass').value;
  const byName = db.users.find(x=>x.username===u);
  if(!byName){ alert('ID "'+u+'" không tồn tại. Kiểm tra lại tên đăng nhập.'); return; }
  if(byName.pass!==hp(p)){ alert('Mật khẩu không đúng cho ID "'+u+'". Bấm 👁 để kiểm tra lại ký tự đã gõ.'); return; }
  const usr = byName;
  if(window._role && usr.role!==window._role){
    const nameOf = r => r==='admin'?'QUẢN LÝ':(r==='accountant'?'KẾ TOÁN':'BÁN HÀNG');
    alert('Tài khoản này thuộc mục '+nameOf(usr.role)+'.'); return;
  }
  me = usr; try{ await dataApi.setSession(usr.id); }catch(e){}
  tab = 'dash'; boot();
}
function go(t){ if(!me) return;

/* ================= TINH TOAN DON HANG ================= */
function orderSubtotal(o){ return o.items.reduce((s,it)=>s+it.qty*it.price,0); }
function orderDiscount(o){
  let d = 0, sub = orderSubtotal(o);
  if(o.promoId){ const p = db.promos.find(x=>x.id===o.promoId); if(p) d += p.type==='percent'? sub*p.value/100 : p.value; }
  d += (o.extraDisc||0);
  return Math.min(d, sub);
}
function orderRevenue(o){ return orderSubtotal(o) - orderDiscount(o); }
function orderCOGS(o){ return o.items.reduce((s,it)=>s+it.qty*(it.cost||0),0); }
function orderProfit(o){ return orderRevenue(o) - orderCOGS(o) - (o.ship||0) - (o.pack||0) - (o.comm||0); }
function inRange(dstr, range){
  const d = (dstr||'').slice(0,10), now = new Date(), y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  if(range==='day') return d === today();
  if(range==='week'){ const t = new Date(); t.setDate(t.getDate()-6); return d >= t.toISOString().slice(0,10); }
  if(range==='month') return d.startsWith(`${y}-${m}`);
  if(range==='year') return d.startsWith(`${y}-`);
  return true;
}
function activeOrders(range){ return db.orders.filter(o=>o.status!=='huy' && inRange(o.date, range)); }
function supplierDebt(supplierId){
  return db.entries.filter(e=>e.supplierId===supplierId && !e.paid).reduce((s,e)=>s+e.qty*e.cost,0);
}
function totalSupplierDebt(){ return db.entries.filter(e=>!e.paid).reduce((s,e)=>s+e.qty*e.cost,0); }
function codPending(){ return db.orders.filter(o=>o.status==='xong' && o.payMethod==='cod' && o.payStatus!=='roi').reduce((s,o)=>s+orderRevenue(o),0); }
function lowStockList(){ return db.products.filter(p=>p.stock<=(p.minStock??10)); }

async function saveOrder(){
  if(!draft.items.length){ alert('Đơn chưa có sản phẩm'); return; }
  for(const it of draft.items){ const p = db.products.find(x=>x.id===it.pid);
    if(p && p.stock < it.qty && !confirm(`"${p.name}" chỉ còn tồn ${p.stock}. Vẫn lưu đơn?`)) return; }
  const st = db.staff.find(s=>s.id===draft.staffId);
  const items = draft.items.map(it=>{ const p = db.products.find(x=>x.id===it.pid);
    return {pid:it.pid, name:p.name, qty:it.qty, price:p.price, cost:p.cost}; });
  const sub = items.reduce((s,it)=>s+it.qty*it.price,0);
  let disc = 0; if(draft.promoId){ const pr = db.promos.find(x=>x.id===draft.promoId); if(pr) disc += pr.type==='percent'? sub*pr.value/100 : pr.value; }
  disc += (+draft.extraDisc||0);
  const autoComm = st ? Math.round((sub-Math.min(disc,sub))*st.pct/100) : 0;
  const comm = draft.commOverride!==null && draft.commOverride!=='' ? +draft.commOverride : autoComm;
  const o = {id:uid(), code:rndCode('DH'), date:draft.date, custId:draft.custId, staffId:draft.staffId,
    items, promoId:draft.promoId, extraDisc:+draft.extraDisc||0, ship:+draft.ship||0, pack:+draft.pack||0, comm,
    vatNeed:draft.vatNeed, vatNo:draft.vatNo, note:draft.note, status:'moi', payMethod:draft.payMethod||'tienmat', payStatus:'chua'};
  items.forEach(it=>{ const p = db.products.find(x=>x.id===it.pid); if(p) p.stock -= it.qty; });
  db.orders.push(o); await saveRec('orders', o); await saveCatalog(); closeSheet(); go('orders');
}

async function setStatus(id,s){
  if(!isOwner()) return;
  const o = db.orders.find(x=>x.id===id);
  if(o.status!=='huy' && s==='huy') o.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p) p.stock+=it.qty; });
  if(o.status==='huy' && s!=='huy') o.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p) p.stock-=it.qty; });
  o.status = s; await saveRec('orders',o); if(o.status==='huy'||s==='moi') await saveCatalog(); render();
}
async function setPayMethod(id,v){ if(!isOwner())return; const o=db.orders.find(x=>x.id===id); o.payMethod=v; await saveRec('orders',o); render(); }
async function markPaid(id){
  if(!isOwner()) return;
  const o = db.orders.find(x=>x.id===id); if(!o) return;
  o.payStatus='roi'; o.paidAt=Date.now();
  await saveRec('orders',o);
  const inc = {id:uid(), date:today(), type:'ban_hang', amount:orderRevenue(o), method:o.payMethod||'tienmat', note:'Thu tiền đơn '+o.code, orderId:o.id};
  db.incomes.push(inc); await saveRec('incomes', inc);
  closeSheet(); render();
}

async function delOrder(id){
  if(!confirm('Xóa đơn này? Tồn kho sẽ được hoàn lại.')) return;

function editEntry(id){ if(!isOwner()) return; formEntry(id); }
async function saveEntry(editId){
  const qty = +$('e_qty').value, cost = $('e_cost')? +$('e_cost').value : 0;
  if(!qty || qty<1){ alert('Nhập số lượng'); return; }
  const lotNo = $('e_lot')?.value.trim()||'', mfgDate = $('e_mfg')?.value||'', expDate = $('e_exp')?.value||'';
  const supplierId = $('e_sup')?.value||''; const paid = $('e_paid')? $('e_paid').value==='1' : true;
  if(editId){
    const en = db.entries.find(x=>x.id===editId), p = db.products.find(x=>x.id===en.pid);
    if(p){ p.stock += (qty - en.qty); if(cost>0){ p.cost = cost; } }
    Object.assign(en, {date:$('e_date').value, qty, lotNo, mfgDate, expDate, paid});
    if(cost>0) en.cost = cost; if($('e_sup')) en.supplierId = supplierId;
    await saveRec('entries', en); await saveCatalog();
  } else {
    const pid = $('e_pid').value, p = db.products.find(x=>x.id===pid);
    p.stock += qty; if(cost>0) p.cost = cost;
    const en = {id:uid(), date:$('e_date').value, pid, qty, cost:cost||p.cost, lotNo, mfgDate, expDate, supplierId, paid};
    db.entries.push(en); await saveRec('entries', en); await saveCatalog();
  }
  closeSheet(); render();
}
async function delEntry(id){
  if(!isOwner()) return;
  if(!confirm('Xóa phiếu nhập này? Số lượng đã cộng vào kho sẽ được trừ lại tương ứng.')) return;
  const en = db.entries.find(x=>x.id===id); const p = db.products.find(x=>x.id===en.pid);
  if(p) p.stock -= en.qty;
  db.entries = db.entries.filter(x=>x.id!==id);
  await delRec('entries', id); await saveCatalog(); closeSheet(); render();
}

function calcVat(){

async function saveVatIn(){

  const pct = +$('vi_pct').value;
  const v = {id:uid(), date:$('vi_date').value, supplier:sup, taxCode:$('vi_tax').value.trim(), invoiceNo:no,
    pretax:pre, vatPct:pct, vatAmt:Math.round(pre*pct/100), total:Math.round(pre*(1+pct/100)), note:$('vi_note').value.trim()};
  db.vatIn.push(v); await saveRec('vatIn', v); closeSheet(); render();

async function delVatIn(id){

function exportVatCSV(){

  db.vatIn.forEach(v=>rows.push([v.date, v.supplier, v.taxCode, v.invoiceNo, v.pretax, v.vatPct, v.vatAmt, v.total, v.note]));

      + (db.users.map(u=>'<div class="list-item" onclick="formUser(\''+u.id+'\')"><div><div class="t">'+esc(u.name)+' <span class="tag '+(u.role==='admin'?'xong':(u.role==='accountant'?'vat':'giao'))+'">'+roleLabel(u.role)+'</span></div><div class="s">ID: '+esc(u.username)+(u.staffId?(' · gắn NV: '+esc((db.staff.find(s=>s.id===u.staffId)||{}).name||'?')):'')+'</div></div></div>').join('')
        || '<div class="empty">Chưa có tài khoản</div>') + '</div>';
    h += '<div class="sec"><h3>Dữ liệu</h3><div style="padding:4px 13px 13px">'
      + '<button class="btn sm line" onclick="backup()">⬇ Sao lưu (JSON)</button>'
      + '<button class="btn sm line" onclick="$(\'imp\').click()">⬆ Khôi phục</button>'
      + '<input type="file" id="imp" accept=".json" style="display:none" onchange="restore(this)">'
      + '<div class="hint">Nên sao lưu định kỳ hàng tuần. File JSON mở lại được trên máy khác.</div></div></div>';
  }
  $('view').innerHTML = h;
}

async function saveStaff(id){

}
async function delStaff(id){ if(!confirm('Xóa nhân viên?')) return; db.staff = db.staff.filter(x=>x.id!==id); db.users = db.users.filter(u=>u.staffId!==id); await saveCatalog(); closeSheet(); render(); }

async function delPromo(id){ if(!confirm('Xóa chương trình?')) return; db.promos = db.promos.filter(x=>x.id!==id); await saveCatalog(); closeSheet(); render(); }

/* ================= TAI KHOAN DANG NHAP ================= */
function formUser(id){
  if(!isOwner()) return;
  const u = db.users.find(x=>x.id===id);
  if(u){
    openSheet('<h2>Tài khoản: '+esc(u.name)+'</h2>'
    +'<div class="hint">ID đăng nhập: <b>'+esc(u.username)+'</b> · Vai trò: '+roleLabel(u.role)+'</div>'
    +'<label>Đặt mật khẩu mới (bỏ trống = giữ nguyên)</label><div class="pwrap"><input id="u_pass" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;u_pass&quot;,this)">👁</button></div>'
    +'<button class="btn" onclick="saveUser(\''+u.id+'\')">Lưu</button>'
    +(u.role!=='admin'? '<button class="btn danger" onclick="delUser(\''+u.id+'\')">Xóa tài khoản</button>':'')
    +'<button class="btn line" onclick="closeSheet()">Đóng</button>');
    return;
  }
  openSheet('<h2>➕ Tạo tài khoản mới</h2>'
  +'<label>Loại tài khoản *</label><select id="u_role" onchange="drawUserRole()"><option value="sale">Bán hàng — gắn 1 nhân viên sale</option><option value="accountant">Kế toán — quản lý hóa đơn đỏ</option></select>'
  +'<div id="u_staffwrap"></div>'
  +'<label>Tên hiển thị *</label><input id="u_name" placeholder="VD: Kế toán Lan">'
  +'<label>Tên đăng nhập (ID) *</label><input id="u_user" autocapitalize="off" placeholder="VD: ketoan01">'
  +'<label>Mật khẩu *</label><div class="pwrap"><input id="u_pass" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;u_pass&quot;,this)">👁</button></div>'
  +'<div class="hint">Đưa ID + mật khẩu này cho người dùng. Họ đăng nhập ở đúng cổng (Bán hàng / Kế toán) trên màn hình chính.</div>'
  +'<button class="btn" onclick="saveUser(\'\')">Tạo tài khoản</button>'
  +'<button class="btn line" onclick="closeSheet()">Đóng</button>');
  drawUserRole();
}
function drawUserRole(){
  const r = $('u_role').value;
  if(r==='sale'){
    if(!db.staff.length){ $('u_staffwrap').innerHTML = '<div class="hint">⚠ Chưa có nhân viên sale nào. Vào mục "Nhân viên sale" ở trên để thêm trước.</div>'; return; }
    $('u_staffwrap').innerHTML = '<label>Gắn với nhân viên *</label><select id="u_staff">'+db.staff.map(s=>'<option value="'+s.id+'">'+esc(s.name)+' ('+s.pct+'%)</option>').join('')+'</select>';
  } else { $('u_staffwrap').innerHTML = ''; }
}
async function saveUser(id){
  if(id){
    const u = db.users.find(x=>x.id===id), p = $('u_pass').value;
    if(p){ if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; } u.pass = hp(p); }
    await saveCatalog(); closeSheet(); render(); return;
  }
  const role = $('u_role').value, name = $('u_name').value.trim(), un = $('u_user').value.trim().toLowerCase(), p = $('u_pass').value;
  if(!name||!un||!p){ alert('Điền đủ thông tin'); return; }
  if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; }
  if(db.users.some(x=>x.username===un)){ alert('ID này đã tồn tại'); return; }
  let staffId = '';
  if(role==='sale'){ if(!db.staff.length){ alert('Chưa có nhân viên sale để gắn.'); return; } staffId = $('u_staff').value; }
  db.users.push({id:uid(), username:un, pass:hp(p), role, name, staffId});
  await saveCatalog(); closeSheet(); render();
}
async function delUser(id){
  if(!confirm('Xóa tài khoản đăng nhập này? (Hồ sơ nhân viên và đơn hàng vẫn giữ nguyên)')) return;
  db.users = db.users.filter(x=>x.id!==id); await saveCatalog(); closeSheet(); render();
}
/* ================= XUAT CSV & SAO LUU ================= */
function dl(name, content, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+content], {type}));
  a.download = name; a.click();
}
function exportCSV(){
  if(!isOwner()) return;
  const rows = [['Mã đơn','Ngày','Khách','SĐT','Địa chỉ','Nhân viên','Sản phẩm','Tiền hàng','Chiết khấu','Khách trả','Giá vốn','Ship','Đóng gói','Hoa hồng','Lợi nhuận','Phương thức TT','Đã thu','HĐ đỏ','Số HĐ','Trạng thái']];
  db.orders.forEach(o=>{
    const c = db.customers.find(x=>x.id===o.custId)||{}, st = db.staff.find(x=>x.id===o.staffId)||{};
    rows.push([o.code, o.date.slice(0,10), c.name||'', c.phone||'', c.address||'', st.name||'',
      o.items.map(i=>i.name+' x'+i.qty).join('; '), orderSubtotal(o), Math.round(orderDiscount(o)), Math.round(orderRevenue(o)),
      orderCOGS(o), o.ship||0, o.pack||0, o.comm||0, Math.round(orderProfit(o)), PAYM[o.payMethod]||'', o.payStatus==='roi'?'Có':'Chưa', o.vatNeed?'Có':'', o.vatNo||'', STATUS[o.status]]);
  });
  dl('ANVIFA-donhang.csv', rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n'), 'text/csv');
}
function backup(){ dl('ANVIFA-saoluu-'+today()+'.json', JSON.stringify(db), 'application/json'); }
function restore(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async () => { try{ const d = JSON.parse(r.result);
    if(!d.products||!d.orders) throw 0;
    if(!confirm('Khôi phục sẽ THAY THẾ toàn bộ dữ liệu hiện tại (kể cả trên các máy khác). Tiếp tục?')) return;
    Object.assign(db, {products:d.products||[], customers:d.customers||[], staff:d.staff||[], suppliers:d.suppliers||[], promos:d.promos||[], users:d.users||[]});
    ensureAdminSeed(); await saveCatalog();
    for(const name of RECORD_COLLECTIONS){
      db[name] = d[name]||[];
      for(const rec of db[name]){ await saveRec(name, rec); }
    }
    alert('Khôi phục xong'); render();
    }catch(e){ alert('File không hợp lệ'); console.error(e); } };
  r.readAsText(f);
}
window.startApp = loadDB;
</script>

<!-- ======================================================================
     KHO DỮ LIỆU CHUNG (Firebase) — mỗi loại dữ liệu 1 vùng lưu trữ riêng
     để nhiều người dùng cùng lúc không ghi đè mất dữ liệu của nhau.
     Cách bật: điền 6 giá trị vào firebaseConfig bên dưới (xem hướng dẫn kèm theo).
     CHƯA điền gì thì app tự chạy bằng bộ nhớ trình duyệt (chỉ 1 máy, để test).
====================================================================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

// ĐIỀN 6 GIÁ TRỊ NÀY TỪ FIREBASE CONSOLE (Project settings → General → Your apps → SDK config)
const firebaseConfig = {
  apiKey: "AIzaSyDHDlqO_QrwOSiBf2SUIIQGC_7w0zQbg3g",
  authDomain: "anvifa-app.firebaseapp.com",
  projectId: "anvifa-app",
  storageBucket: "anvifa-app.firebasestorage.app",
  messagingSenderId: "903165167895",
  appId: "1:903165167895:web:7387f2bf78eb95a23c8f52"
};

const useFirebase = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PASTE");
const RECORD_COLLS = ['orders','entries','quotes','adjustments','incomes','expenses','vatIn'];

if(useFirebase){
  const app = initializeApp(firebaseConfig);
  const fdb = getFirestore(app);
  const auth = getAuth(app);
  const catalogRef = doc(fdb, "anvifa_meta", "catalog");

  const authReady = new Promise((resolve)=>{
    const unsub = onAuthStateChanged(auth, (u)=>{ if(u){ unsub(); resolve(); } });
    signInAnonymously(auth).catch(err=>{ console.error("Firebase auth lỗi:", err); document.getElementById('sync').textContent='lỗi kết nối!'; });
  });

  let lastCatalogPush = null;
  const lastRecPush = {};

  window.dataApi = {
    async getCatalog(){
      await authReady;
      const snap = await getDoc(catalogRef);
      if(!snap.exists()) throw new Error('empty');
      return snap.data();
    },
    async setCatalog(obj){
      await authReady;
      lastCatalogPush = JSON.stringify(obj);
      await setDoc(catalogRef, obj);
    },
    async getRecords(name){
      await authReady;
      const snap = await getDocs(collection(fdb, 'anvifa_'+name));
      return snap.docs.map(d=>d.data());
    },
    async setRecord(name, rec){
      await authReady;
      lastRecPush[name+':'+rec.id] = JSON.stringify(rec);
      await setDoc(doc(fdb, 'anvifa_'+name, rec.id), rec);
    },
    async delRecord(name, id){
      await authReady;
      await deleteDoc(doc(fdb, 'anvifa_'+name, id));
    },
    async getSession(){
      const v = localStorage.getItem('anvifa_session');
      if(!v) throw new Error('empty');
      return v;
    },
    async setSession(v){ localStorage.setItem('anvifa_session', v); },
    subscribeCatalog(cb){
      onSnapshot(catalogRef, snap=>{
        if(!snap.exists()){ cb(null); return; }
        const raw = JSON.stringify(snap.data());
        if(raw !== lastCatalogPush) cb(snap.data());
      });
    },
    subscribeCollection(name, cb){
      onSnapshot(collection(fdb, 'anvifa_'+name), snap=>{
        const list = snap.docs.map(d=>d.data());
        cb(list);
      });
    }
  };
  authReady.then(()=>{ window.startApp(); });
} else {
  // Chưa cấu hình Firebase -> chạy tạm bằng bộ nhớ trình duyệt (chỉ 1 máy)
  const lsKey = n => 'anvifa_local_'+n;
  window.dataApi = {
    async getCatalog(){ const v = localStorage.getItem(lsKey('catalog')); if(v===null) throw new Error('empty'); return JSON.parse(v); },
    async setCatalog(obj){ localStorage.setItem(lsKey('catalog'), JSON.stringify(obj)); },
    async getRecords(name){ const v = localStorage.getItem(lsKey(name)); return v? JSON.parse(v) : []; },
    async setRecord(name, rec){ const list = await this.getRecords(name); const i = list.findIndex(x=>x.id===rec.id); if(i>=0) list[i]=rec; else list.push(rec); localStorage.setItem(lsKey(name), JSON.stringify(list)); },
    async delRecord(name, id){ const list = await this.getRecords(name); localStorage.setItem(lsKey(name), JSON.stringify(list.filter(x=>x.id!==id))); },
    async getSession(){ const v = localStorage.getItem('anvifa_session'); if(!v) throw new Error('empty'); return v; },
    async setSession(v){ localStorage.setItem('anvifa_session', v); },
    subscribeCatalog(cb){ this.getCatalog().then(cb).catch(()=>cb(null)); },
    subscribeCollection(name, cb){ this.getRecords(name).then(list=>cb(list)); }
  };
  console.warn('ANVIFA: chưa cấu hình Firebase — dữ liệu chỉ lưu trên máy này. Xem hướng dẫn đi kèm để bật đồng bộ chung.');
  window.startApp();
}
</script>
