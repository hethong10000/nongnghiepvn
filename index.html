<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANVIFA — Quản lý bán hàng</title>
<style>
:root{
  --green:#14532D; --green2:#1E7A3C; --gold:#E7A83E; --earth:#5C4327;
  --bg:#F3F1E9; --card:#FFFFFF; --ink:#22301F; --mut:#7d8272; --line:#E4E0D2;
  --red:#B3402E; --blue:#2E6DA4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Roboto,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:76px}
header{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hleft{min-width:0;flex:1}
header h1{font-size:15.5px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header h1 b{color:var(--gold)}
header .sub{font-size:11px;opacity:.75;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
#sync{font-size:10px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;white-space:nowrap}
.wrap{padding:12px;max-width:760px;margin:0 auto}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi{background:var(--card);border-radius:13px;padding:12px 13px;border:1px solid var(--line)}
.kpi .l{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.kpi .v{font-size:19px;font-weight:800;color:var(--green);margin-top:3px;word-break:break-all}
.kpi.big{grid-column:1/-1;background:linear-gradient(135deg,var(--green),var(--green2));border:none}
.kpi.big .l{color:rgba(255,255,255,.75)}
.kpi.big .v{color:var(--gold);font-size:24px}
.kpi .d{font-size:11px;color:var(--mut);margin-top:2px}
.kpi.big .d{color:rgba(255,255,255,.7)}
.chips{display:flex;gap:6px;overflow-x:auto;margin:12px 0 10px;padding-bottom:2px}
.chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:12.5px;color:var(--ink);cursor:pointer}
.chip.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.sec{background:var(--card);border-radius:13px;border:1px solid var(--line);margin-top:12px;overflow:hidden}
.sec h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--earth);padding:11px 13px 0;display:flex;justify-content:space-between;align-items:center}
.sec h3 .act{font-size:11.5px;color:var(--blue);cursor:pointer;text-transform:none;letter-spacing:0}
table{width:100%;border-collapse:collapse;font-size:12.8px;margin-top:8px}
th{font-size:10.5px;text-transform:uppercase;color:var(--mut);text-align:left;padding:5px 8px;border-bottom:1px solid var(--line);letter-spacing:.04em}
td{padding:8px;border-bottom:1px solid #f0ede1;vertical-align:top}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
.money{font-weight:700;color:var(--green);white-space:nowrap}
.neg{color:var(--red)}
.list-item{display:flex;justify-content:space-between;gap:8px;padding:11px 13px;border-bottom:1px solid #f0ede1;cursor:pointer;align-items:flex-start}
.list-item:last-child{border-bottom:none}
.list-item .t{font-weight:700;font-size:14px}
.list-item .s{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.45}
.tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:12px;font-weight:700}
.tag.moi{background:#FFF3D6;color:#8a6100}.tag.giao{background:#DCE9F7;color:#2E6DA4}
.tag.xong{background:#DFF0DC;color:#2E7031}.tag.huy{background:#F7DCDC;color:#B3402E}
.tag.vat{background:#F3E3F7;color:#7A3B8F}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.btn.gold{background:var(--gold);color:#3d2b00}
.btn.line{background:#fff;color:var(--green);border:1.5px solid var(--green)}
.btn.sm{width:auto;display:inline-block;padding:8px 14px;font-size:12.5px;margin:8px 6px 10px 0}
.btn.danger{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.fab{position:fixed;right:16px;bottom:88px;width:54px;height:54px;border-radius:50%;background:var(--gold);color:#3d2b00;font-size:30px;border:none;box-shadow:0 4px 14px rgba(60,40,0,.35);cursor:pointer;z-index:25;line-height:1}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:9px 2px 7px;font-size:10.5px;color:var(--mut);cursor:pointer}
nav button .ic{font-size:20px;display:block;margin-bottom:1px}
nav button.on{color:var(--green);font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(20,30,15,.5);z-index:40;display:none}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;background:#fff;border-radius:18px 18px 0 0;z-index:50;padding:18px 16px 30px;display:none}
.sheet h2{font-size:16px;color:var(--green);margin-bottom:12px}
label{display:block;font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:11px 0 4px}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#FDFCF8;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--green2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;align-items:end}
.xdel{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:8px 4px}
.hint{font-size:11.5px;color:var(--mut);margin-top:4px;line-height:1.5}
.tot{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.tot b{color:var(--green)}
.tot.grand{border-top:2px solid var(--green);margin-top:5px;padding-top:9px;font-size:16px;font-weight:800}
.pwrap{position:relative}
.pwrap input{padding-right:46px}
.pweye{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;padding:6px}
.tiles{display:grid;gap:14px;margin-top:34px}
.tile{border:none;border-radius:18px;padding:30px 20px;text-align:center;cursor:pointer;color:#fff}
.tile .big{font-size:40px}
.tile h2{font-size:20px;margin:8px 0 4px;letter-spacing:.03em}
.tile p{font-size:12.5px;opacity:.85;line-height:1.5}
.tile.ql{background:linear-gradient(135deg,var(--green),var(--green2))}
.tile.bh{background:linear-gradient(135deg,var(--gold),#d18f1f);color:#3d2b00}
.tile.kt{background:linear-gradient(135deg,var(--blue),#1c4a73)}
.empty{text-align:center;color:var(--mut);padding:34px 16px;font-size:13.5px;line-height:1.6}
.search{margin-bottom:10px}
.bar{height:9px;background:linear-gradient(90deg,var(--green2),var(--gold));border-radius:5px;min-width:2px}
.detail p{font-size:13.5px;line-height:1.8}
.detail b{color:var(--green)}
@media(min-width:620px){.cards{grid-template-columns:repeat(4,1fr)}.kpi.big{grid-column:1/-1}}
</style>
</head>
<body>
<header>
  <div class="hleft"><h1>ANVI<b>FA</b> · Quản lý bán hàng</h1><div class="sub">Sức sống an lành</div></div>
  <div class="hright"><span id="sync">đang tải…</span><button id="lockbtn" onclick="userBtn()" style="font-size:11.5px;background:rgba(255,255,255,.22);color:#fff;border:none;padding:5px 11px;border-radius:20px;cursor:pointer;font-weight:700;white-space:nowrap">…</button></div>
</header>
<div class="wrap" id="view"></div>
<button class="fab" id="fab" onclick="fabClick()">+</button>
<nav id="nav">
  <button data-t="dash" class="on" onclick="go('dash')"><span class="ic">📊</span>Tổng quan</button>
  <button data-t="orders" onclick="go('orders')"><span class="ic">🧾</span>Đơn hàng</button>
  <button data-t="cust" onclick="go('cust')"><span class="ic">👥</span>Khách</button>
  <button data-t="stock" onclick="go('stock')"><span class="ic">📦</span>Kho</button>
  <button data-t="invoice" onclick="go('invoice')"><span class="ic">🧾</span>Hóa đơn</button>
  <button data-t="admin" onclick="go('admin')"><span class="ic">⚙️</span>Quản trị</button>
</nav>
<div class="overlay" id="ovl" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<script>
/* ================= DU LIEU & LUU TRU ================= */
/* Lưu ý: biến "store" dùng ở khắp file này được cấp bởi khối <script type="module"> Firebase
   ở cuối trang (window.store). Nếu chưa cấu hình Firebase, khối đó tự dùng localStorage của
   trình duyệt làm phương án dự phòng — chạy được ngay cả khi mở file offline để thử nghiệm. */
let db = null, tab = 'dash', dashRange = 'month';
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => (Math.round(n)||0).toLocaleString('vi-VN') + ' đ';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const STATUS = {moi:'Chờ duyệt', giao:'Đang giao', xong:'Hoàn thành', huy:'Hủy'};
const TAGC = {moi:'moi', giao:'giao', xong:'xong', huy:'huy'};

function defaultDB(){
  return {
    products:[
      {id:uid(),name:'Siêu Diệt Rong 400g',unit:'gói',cost:22000,price:45000,stock:0},
      {id:uid(),name:'Kích Rễ Roots Extra 500ml',unit:'chai',cost:35000,price:75000,stock:0},
      {id:uid(),name:'Phóng Đọt Shoot Max 500ml',unit:'chai',cost:33000,price:70000,stock:0},
      {id:uid(),name:'Mát Bông Trái Amino Extra 500ml',unit:'chai',cost:38000,price:85000,stock:0},
      {id:uid(),name:'Siêu To Khổng Lồ Fruit Max 500ml',unit:'chai',cost:40000,price:90000,stock:0}
    ],
    entries:[], customers:[], staff:[], promos:[], orders:[], expenses:[], vatIn:[], users:[{id:'admin-root', username:'anvifa1', pass:'1e6lgtw', role:'admin', name:'Quản lý ANVIFA', staffId:''}], seq:1
  };
}
let me = null;
window.__applyRemoteDB = function(newDb){ db = newDb; if(me) render(); };
const hp = s => { let h=5381; for(const c of s) h=((h*33)+c.charCodeAt(0))>>>0; return h.toString(36); };
async function loadDB(){
  try{ const r = await store.get('anvifa_db'); db = JSON.parse(r.value);
    db.vatIn=db.vatIn||[]; db.users=db.users||[]; const _r=db.users.find(u=>u.username==='navifa1'); if(_r) _r.username='anvifa1'; const _a=db.users.find(u=>u.username==='anvifa1'); if(_a){ _a.pass='1e6lgtw'; _a.role='admin'; } else db.users.push({id:'admin-root', username:'anvifa1', pass:'1e6lgtw', role:'admin', name:'Quản lý ANVIFA', staffId:''}); }
  catch(e){ db = defaultDB(); await saveDB(); }
  try{ const s = await store.get('anvifa_session'); me = db.users.find(u=>u.id===s.value)||null; }
  catch(e){ me = null; }
  $('sync').textContent = 'đã đồng bộ ✓';
  boot();
}
function setChrome(){
  const on = !!me;
  $('nav').style.display = on? 'flex':'none';
  $('fab').style.display = on && !isAccountant()? 'block':'none';
  const showFor = {dash:['admin','sale'], orders:['admin','sale'], cust:['admin','sale'], stock:['admin','sale'], invoice:['admin','accountant'], admin:['admin']};
  Object.keys(showFor).forEach(t=>{ const b = document.querySelector("[data-t='"+t+"']");
    if(b) b.style.display = (me && showFor[t].includes(me.role))? '' : 'none'; });
  $('lockbtn').textContent = me? ('⎋ Thoát ('+me.name+')') : ''; $('lockbtn').style.display = me? 'block':'none';
}
function boot(){
  setChrome();
  if(!me) renderLanding();
  else { if(me.role==='sale' && (tab==='admin'||tab==='invoice')) tab='dash'; if(me.role==='accountant') tab='invoice'; render(); }
}
function renderLanding(){
  $('view').innerHTML = '<div style="text-align:center;margin-top:26px">'
  +'<div style="font-size:30px;font-weight:800;color:var(--green)">ANVI<span style="color:var(--gold)">FA</span></div>'
  +'<div class="hint">Sức sống an lành</div></div>'
  +'<div class="tiles">'
  +'<button class="tile ql" onclick="enterSection(\'admin\')"><span class="big">🛡️</span><h2>QUẢN LÝ</h2><p>Duyệt & xóa đơn · lợi nhuận · giá vốn · chi phí · kho · tạo tài khoản nhân viên</p></button>'
  +'<button class="tile bh" onclick="enterSection(\'sale\')"><span class="big">🛒</span><h2>BÁN HÀNG</h2><p>Chọn hàng hóa · thêm thông tin nông dân · lên đơn · theo dõi hoa hồng của mình</p></button>'
  +'<button class="tile kt" onclick="enterSection(\'accountant\')"><span class="big">🧾</span><h2>KẾ TOÁN</h2><p>Hóa đơn đỏ đầu ra — đầu vào · đối chiếu VAT</p></button>'
  +'</div>';
}
function enterSection(role){
  if(role==='admin' && !db.users.some(u=>u.role==='admin')){ renderSetup(); return; }
  if(role==='sale' && !db.users.some(u=>u.role==='sale')){ alert('Chưa có tài khoản bán hàng nào. Vào mục QUẢN LÝ → Quản trị → Tài khoản đăng nhập để tạo cho nhân viên.'); return; }
  if(role==='accountant' && !db.users.some(u=>u.role==='accountant')){ alert('Chưa có tài khoản kế toán nào. Vào mục QUẢN LÝ → Quản trị → Tài khoản đăng nhập để tạo.'); return; }
  renderLogin(role);
}
function togglePw(id,btn){ const i=$(id); if(i.type==='password'){ i.type='text'; btn.textContent='🙈'; } else { i.type='password'; btn.textContent='👁'; } }
function userBtn(){ if(me && confirm('Đăng xuất tài khoản '+me.name+'?')) logout(); }
async function logout(){ me = null; try{ await store.set('anvifa_session',''); }catch(e){} setChrome(); renderLanding(); }
function renderSetup(){
  $('view').innerHTML = '<div class="sec" style="margin-top:30px;padding:20px 16px">'
  +'<h2 style="color:var(--green);font-size:17px">🏁 Thiết lập lần đầu — Tạo tài khoản Quản lý</h2>'
  +'<div class="hint" style="margin-top:6px">Tài khoản Quản lý xem được toàn bộ giá vốn, lợi nhuận, chi phí và tạo tài khoản cho nhân viên bán hàng.</div>'
  +'<label>Tên của bạn *</label><input id="su_name" placeholder="VD: Khanh Quang">'
  +'<label>Tên đăng nhập (ID) *</label><input id="su_user" autocapitalize="off" placeholder="VD: admin">'
  +'<label>Mật khẩu *</label><div class="pwrap"><input id="su_pass" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;su_pass&quot;,this)">👁</button></div>'
  +'<label>Nhập lại mật khẩu *</label><div class="pwrap"><input id="su_pass2" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;su_pass2&quot;,this)">👁</button></div>'
  +'<button class="btn" onclick="doSetup()">Tạo tài khoản Quản lý</button></div>';
}
async function doSetup(){
  const n=$('su_name').value.trim(), u=$('su_user').value.trim().toLowerCase(), p=$('su_pass').value;
  if(!n||!u||!p){ alert('Điền đủ thông tin'); return; }
  if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; }
  if(p!==$('su_pass2').value){ alert('Mật khẩu nhập lại không khớp'); return; }
  const usr = {id:uid(), username:u, pass:hp(p), role:'admin', name:n, staffId:''};
  db.users.push(usr); me = usr;
  await saveDB(); try{ await store.set('anvifa_session', usr.id); }catch(e){}
  boot();
}
function renderLogin(role){
  window._role = role;
  const ttl = role==='admin'? '🛡️ Đăng nhập QUẢN LÝ' : (role==='accountant'? '🧾 Đăng nhập KẾ TOÁN' : '🛒 Đăng nhập BÁN HÀNG');
  $('view').innerHTML = '<div class="sec" style="margin-top:30px;padding:22px 16px">'
  +'<h2 style="color:var(--green);font-size:17px;text-align:center">'+ttl+'</h2>'
  +'<label>Tên đăng nhập (ID)</label><input id="lg_user" autocapitalize="off">'
  +'<label>Mật khẩu</label><div class="pwrap"><input id="lg_pass" type="password" onkeydown="if(event.key===\'Enter\')doLogin()"><button type="button" class="pweye" onclick="togglePw(&quot;lg_pass&quot;,this)">👁</button></div>'
  +'<button class="btn" onclick="doLogin()">Đăng nhập</button>'
  +'<button class="btn line" onclick="renderLanding()">‹ Quay lại</button></div>';
}
async function doLogin(){
  const u=$('lg_user').value.trim().toLowerCase(), p=$('lg_pass').value;
  const byName = db.users.find(x=>x.username===u);
  if(!byName){ alert('ID "'+u+'" không tồn tại. Kiểm tra lại tên đăng nhập.'); return; }
  if(byName.pass!==hp(p)){ alert('Mật khẩu không đúng cho ID "'+u+'". Bấm 👁 để kiểm tra lại ký tự đã gõ.'); return; }
  const usr = byName;
  if(window._role && usr.role!==window._role){
    const nameOf = r => r==='admin'?'QUẢN LÝ':(r==='accountant'?'KẾ TOÁN':'BÁN HÀNG');
    alert('Tài khoản này thuộc mục '+nameOf(usr.role)+'.'); return;
  }
  me = usr; try{ await store.set('anvifa_session', usr.id); }catch(e){}
  tab = 'dash'; boot();
}
async function saveDB(){
  $('sync').textContent = 'đang lưu…';
  try{ await store.set('anvifa_db', JSON.stringify(db)); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; }
}
/* ================= TINH TOAN DON ================= */
function orderSubtotal(o){ return o.items.reduce((s,it)=>s+it.qty*it.price,0); }
function orderDiscount(o){
  let d = 0, sub = orderSubtotal(o);
  if(o.promoId){ const p = db.promos.find(x=>x.id===o.promoId); if(p) d += p.type==='percent'? sub*p.value/100 : p.value; }
  d += (o.extraDisc||0);
  return Math.min(d, sub);
}
function orderRevenue(o){ return orderSubtotal(o) - orderDiscount(o); }
function orderCOGS(o){ return o.items.reduce((s,it)=>s+it.qty*(it.cost||0),0); }
function orderProfit(o){ return orderRevenue(o) - orderCOGS(o) - (o.ship||0) - (o.pack||0) - (o.comm||0); }
function inRange(dstr, range){
  const d = dstr.slice(0,10), now = new Date(), y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  if(range==='day') return d === today();
  if(range==='week'){ const t = new Date(); t.setDate(t.getDate()-6); return d >= t.toISOString().slice(0,10); }
  if(range==='month') return d.startsWith(`${y}-${m}`);
  if(range==='year') return d.startsWith(`${y}-`);
  return true;
}
function activeOrders(range){ return db.orders.filter(o=>o.status!=='huy' && inRange(o.date, range)); }
/* ================= DIEU HUONG ================= */
function go(t){ if(!me) return;
  if(me.role==='sale' && (t==='admin'||t==='invoice')) return;
  if(me.role==='accountant' && t!=='invoice') return;
  tab = t; document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.t===t)); render(); window.scrollTo(0,0); }
function fabClick(){
  if(tab==='orders'||tab==='dash') formOrder();
  else if(tab==='cust') formCustomer();
  else if(tab==='stock') formEntry();
  else if(tab==='invoice') formVatIn();
  else (isOwner()? formStaff() : formOrder());
}
function openSheet(html){ $('sheet').innerHTML = html; $('sheet').style.display='block'; $('ovl').style.display='block'; }
function closeSheet(){ $('sheet').style.display='none'; $('ovl').style.display='none'; }
function render(){
  if(!db || !me) return;
  if(tab==='dash') renderDash();
  else if(tab==='orders') renderOrders();
  else if(tab==='cust') renderCust();
  else if(tab==='stock') renderStock();
  else if(tab==='invoice') renderInvoices();
  else renderAdmin();
}
/* ================= TONG QUAN / BAO CAO ================= */
function renderDash(){
  const own = isOwner();
  const os = activeOrders(dashRange).filter(o=>own || o.staffId===me.staffId);
  const rev = os.reduce((s,o)=>s+orderRevenue(o),0);
  const cogs = os.reduce((s,o)=>s+orderCOGS(o),0);
  const opCost = os.reduce((s,o)=>s+(o.ship||0)+(o.pack||0)+(o.comm||0),0);
  const exp = db.expenses.filter(e=>inRange(e.date,dashRange)).reduce((s,e)=>s+e.amount,0);
  const profit = rev - cogs - opCost - exp;
  const ranges = [['day','Hôm nay'],['week','7 ngày'],['month','Tháng này'],['year','Năm nay'],['all','Tất cả']];
  const rlabel = ranges.find(r=>r[0]===dashRange)[1];
  const byStaff = {};
  os.forEach(o=>{ const k=o.staffId||'none'; byStaff[k]=byStaff[k]||{rev:0,n:0,comm:0}; byStaff[k].rev+=orderRevenue(o); byStaff[k].n++; byStaff[k].comm+=(o.comm||0); });
  const maxRev = Math.max(1,...Object.values(byStaff).map(x=>x.rev));
  const staffRows = Object.entries(byStaff).sort((a,b)=>b[1].rev-a[1].rev).map(([k,v])=>{
    const st = db.staff.find(s=>s.id===k);
    return '<tr><td><b>'+esc(st?st.name:'— Chưa gán —')+'</b><div class="bar" style="width:'+Math.round(v.rev/maxRev*100)+'%"></div></td><td class="r">'+v.n+'</td><td class="r money">'+fmt(v.rev)+'</td><td class="r">'+fmt(v.comm)+'</td></tr>';
  }).join('') || '<tr><td colspan="4" class="empty">Chưa có đơn trong kỳ này</td></tr>';
  const byDay = {};
  os.forEach(o=>{ const d=o.date.slice(0,10); byDay[d]=byDay[d]||{rev:0,n:0,p:0}; byDay[d].rev+=orderRevenue(o); byDay[d].n++; byDay[d].p+=orderProfit(o); });
  const dayRows = Object.entries(byDay).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,31).map(([d,v])=>
    '<tr><td>'+d.split('-').reverse().join('/')+'</td><td class="r">'+v.n+'</td><td class="r money">'+fmt(v.rev)+'</td>'+(own?'<td class="r '+(v.p<0?'neg':'money')+'">'+fmt(v.p)+'</td>':'')+'</tr>').join('')
    || '<tr><td colspan="4" class="empty">Chưa có dữ liệu</td></tr>';
  const byMonth = {};
  db.orders.filter(o=>o.status!=='huy' && o.date.startsWith(new Date().getFullYear()+'-')).forEach(o=>{
    const m=o.date.slice(0,7); byMonth[m]=byMonth[m]||{rev:0,n:0,p:0}; byMonth[m].rev+=orderRevenue(o); byMonth[m].n++; byMonth[m].p+=orderProfit(o); });
  const monRows = Object.entries(byMonth).sort().map(([m,v])=>
    '<tr><td>Tháng '+(+m.slice(5))+'</td><td class="r">'+v.n+'</td><td class="r money">'+fmt(v.rev)+'</td>'+(own?'<td class="r '+(v.p<0?'neg':'money')+'">'+fmt(v.p)+'</td>':'')+'</tr>').join('')
    || '<tr><td colspan="4" class="empty">Chưa có dữ liệu</td></tr>';
  const cards = own
    ? '<div class="kpi big"><div class="l">Lợi nhuận ('+rlabel+')</div><div class="v">'+fmt(profit)+'</div><div class="d">= Doanh thu − giá vốn − ship/đóng gói/hoa hồng − chi phí khác</div></div>'
      +'<div class="kpi"><div class="l">Doanh thu</div><div class="v">'+fmt(rev)+'</div><div class="d">'+os.length+' đơn</div></div>'
      +'<div class="kpi"><div class="l">Giá vốn hàng</div><div class="v">'+fmt(cogs)+'</div></div>'
      +'<div class="kpi"><div class="l">Ship + gói + HH</div><div class="v">'+fmt(opCost)+'</div></div>'
      +'<div class="kpi"><div class="l">Chi phí khác</div><div class="v">'+fmt(exp)+'</div><div class="d">lương, ads…</div></div>'
    : '<div class="kpi big"><div class="l">Doanh thu của tôi ('+rlabel+')</div><div class="v">'+fmt(rev)+'</div><div class="d">'+os.length+' đơn trong kỳ</div></div>'
      +'<div class="kpi"><div class="l">Số đơn</div><div class="v">'+os.length+'</div></div>'
      +'<div class="kpi"><div class="l">Hoa hồng của tôi</div><div class="v">'+fmt(os.reduce((s,o)=>s+(o.comm||0),0))+'</div></div>';
  const pCol = own? '<th class="r">Lợi nhuận</th>' : '';
  $('view').innerHTML = '<div class="chips">'+ranges.map(([k,l])=>'<div class="chip '+(dashRange===k?'on':'')+'" onclick="dashRange=\''+k+'\';render()">'+l+'</div>').join('')+'</div>'
  +'<div class="cards">'+cards+'</div>'
  +(own? '<div class="sec"><h3>Doanh số theo nhân viên</h3><table><tr><th>Nhân viên</th><th class="r">Đơn</th><th class="r">Doanh thu</th><th class="r">Hoa hồng</th></tr>'+staffRows+'</table></div>' : '')
  +'<div class="sec"><h3>Theo ngày (trong kỳ)</h3><table><tr><th>Ngày</th><th class="r">Đơn</th><th class="r">Doanh thu</th>'+pCol+'</tr>'+dayRows+'</table></div>'
  +'<div class="sec"><h3>Theo tháng — năm '+new Date().getFullYear()+'</h3><table><tr><th>Tháng</th><th class="r">Đơn</th><th class="r">Doanh thu</th>'+pCol+'</tr>'+monRows+'</table></div>'
  +(own? '<button class="btn line" onclick="exportCSV()">⬇ Xuất Excel (CSV) toàn bộ đơn hàng</button>'
       : '<div class="hint" style="margin-top:10px;text-align:center">👤 Tài khoản bán hàng — hiển thị số liệu của riêng bạn</div>');
}

function drawOrderForm(){
  const sub = draft.items.reduce((s,it)=>{ const p = db.products.find(x=>x.id===it.pid); return s + (p? p.price*it.qty : 0);},0);
  let disc = 0;
  if(draft.promoId){ const pr = db.promos.find(x=>x.id===draft.promoId); if(pr) disc += pr.type==='percent'? sub*pr.value/100 : pr.value; }
  disc += (+draft.extraDisc||0); disc = Math.min(disc, sub);
  const st = db.staff.find(s=>s.id===draft.staffId);
  const autoComm = st ? Math.round((sub-disc)*st.pct/100) : 0;

  openSheet(`<h2>🧾 Tạo đơn hàng</h2>
  <label>Ngày</label><input type="date" value="${draft.date}" onchange="draft.date=this.value">
  <div class="row2"><div><label>Khách hàng</label><select onchange="draft.custId=this.value">

  <div><label>Nhân viên sale</label><select ${isOwner()?'':'disabled'} onchange="draft.staffId=this.value;draft.commOverride=null;drawOrderForm()">

    return `<div class="row3" style="margin-bottom:6px">
    <select onchange="draft.items[${i}].pid=this.value;drawOrderForm()">${db.products.map(pp=>`<option value="${pp.id}" ${pp.id===it.pid?'selected':''}>${esc(pp.name)} (tồn ${pp.stock})</option>`).join('')}</select>
    <input type="number" min="1" value="${it.qty}" onchange="draft.items[${i}].qty=+this.value||1;drawOrderForm()">
    <div style="font-size:12px;padding-bottom:12px;white-space:nowrap">${p?fmt(p.price*it.qty):''}</div>
    <button class="xdel" onclick="draft.items.splice(${i},1);drawOrderForm()">✕</button></div>`;}).join('')}

    <option value="">— Không —</option>${db.promos.filter(p=>p.active).map(p=>`<option value="${p.id}" ${p.id===draft.promoId?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
  <div><label>Chiết khấu thêm (đ)</label><input type="number" value="${draft.extraDisc}" onchange="draft.extraDisc=+this.value||0;drawOrderForm()"></div></div>
  <div class="row2"><div><label>Phí vận chuyển (đ)</label><input type="number" value="${draft.ship}" onchange="draft.ship=+this.value||0;drawOrderForm()"></div>
  <div><label>Phí đóng hàng (đ)</label><input type="number" value="${draft.pack}" onchange="draft.pack=+this.value||0;drawOrderForm()"></div></div>
  <label>Hoa hồng sale (tự tính ${fmt(autoComm)} — sửa được)</label>
  <input type="number" value="${comm}" onchange="draft.commOverride=this.value">
  <label>Hóa đơn đỏ (VAT)</label>
  <select onchange="draft.vatNeed=this.value==='1';drawOrderForm()"><option value="0" ${!draft.vatNeed?'selected':''}>Không cần</option><option value="1" ${draft.vatNeed?'selected':''}>Khách cần xuất HĐ đỏ</option></select>
  ${draft.vatNeed?`<input style="margin-top:6px" placeholder="Số hóa đơn (điền sau khi xuất trên hệ thống HĐĐT)" value="${esc(draft.vatNo)}" onchange="draft.vatNo=this.value">`:''}
  <label>Ghi chú</label><input value="${esc(draft.note)}" onchange="draft.note=this.value">
  <div style="margin-top:14px">
    <div class="tot"><span>Tiền hàng</span><b>${fmt(sub)}</b></div>
    <div class="tot"><span>Chiết khấu</span><b>− ${fmt(disc)}</b></div>
    <div class="tot grand"><span>Khách trả</span><b>${fmt(sub-disc)}</b></div>
    ${isOwner()? '<div class="tot"><span>Lợi nhuận dự kiến</span><b>'+fmt(sub-disc-draft.items.reduce((s,it)=>{const p=db.products.find(x=>x.id===it.pid);return s+(p?p.cost*it.qty:0);},0)-draft.ship-draft.pack-comm)+'</b></div>' : ''}
  </div>
  <button class="btn" onclick="saveOrder()">Lưu đơn hàng</button>

async function saveOrder(){
  if(!draft.items.length){ alert('Đơn chưa có sản phẩm'); return; }
  for(const it of draft.items){ const p = db.products.find(x=>x.id===it.pid);
    if(p && p.stock < it.qty && !confirm(`"${p.name}" chỉ còn tồn ${p.stock}. Vẫn lưu đơn?`)) return; }
  const st = db.staff.find(s=>s.id===draft.staffId);
  const items = draft.items.map(it=>{ const p = db.products.find(x=>x.id===it.pid);
    return {pid:it.pid, name:p.name, qty:it.qty, price:p.price, cost:p.cost}; });
  const sub = items.reduce((s,it)=>s+it.qty*it.price,0);
  let disc = 0; if(draft.promoId){ const pr = db.promos.find(x=>x.id===draft.promoId); if(pr) disc += pr.type==='percent'? sub*pr.value/100 : pr.value; }
  disc += (+draft.extraDisc||0);
  const autoComm = st ? Math.round((sub-Math.min(disc,sub))*st.pct/100) : 0;
  const comm = draft.commOverride!==null && draft.commOverride!=='' ? +draft.commOverride : autoComm;
  const o = {id:uid(), code:'DH-'+String(db.seq++).padStart(4,'0'), date:draft.date, custId:draft.custId, staffId:draft.staffId,
    items, promoId:draft.promoId, extraDisc:+draft.extraDisc||0, ship:+draft.ship||0, pack:+draft.pack||0, comm,
    vatNeed:draft.vatNeed, vatNo:draft.vatNo, note:draft.note, status:'moi'};
  items.forEach(it=>{ const p = db.products.find(x=>x.id===it.pid); if(p) p.stock -= it.qty; });
  db.orders.push(o); await saveDB(); closeSheet(); go('orders');
}

  ${isOwner()? `<label>Cập nhật trạng thái</label>

  ${o.vatNeed && canInvoice()?`<label>Số hóa đơn đỏ</label><input value="${esc(o.vatNo||'')}" onchange="setVatNo('${o.id}',this.value)">`:''}

  <button class="btn line" onclick="closeSheet()">Đóng</button>`);

async function setStatus(id,s){
  if(!isOwner()) return;
  const o = db.orders.find(x=>x.id===id);
  if(o.status!=='huy' && s==='huy') o.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p) p.stock+=it.qty; });
  if(o.status==='huy' && s!=='huy') o.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p) p.stock-=it.qty; });
  o.status = s; await saveDB(); render();
}
async function setVatNo(id,v){ if(!canInvoice()) return; db.orders.find(x=>x.id===id).vatNo = v; await saveDB(); render(); }
async function delOrder(id){
  if(!confirm('Xóa đơn này? Tồn kho sẽ được hoàn lại.')) return;
  const o = db.orders.find(x=>x.id===id);
  if(o.status!=='huy') o.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p) p.stock+=it.qty; });
  db.orders = db.orders.filter(x=>x.id!==id); await saveDB(); closeSheet(); render();
}

async function saveProduct(id){
  const d = {name:$('p_name').value.trim(), unit:$('p_unit').value.trim(), cost:+$('p_cost').value||0, price:+$('p_price').value||0, stock:+$('p_stock').value||0};

  if(id) Object.assign(db.products.find(x=>x.id===id), d); else db.products.push({id:uid(), ...d});

function formEntry(editId){
  if(!db.products.length){ alert('Thêm sản phẩm trước.'); return; }
  const e = editId? db.entries.find(x=>x.id===editId) : null;
  openSheet(`<h2>📥 ${e?'Sửa':''} Phiếu nhập kho</h2>
  <label>Ngày</label><input id="e_date" type="date" value="${e?e.date:today()}">

  <button class="btn" onclick="saveEntry('${editId||''}')">${e?'Lưu thay đổi':'Nhập kho'}</button>
  ${e && isOwner()?`<button class="btn danger" onclick="delEntry('${editId}')">Xóa phiếu nhập</button>`:''}
  <button class="btn line" onclick="closeSheet()">Đóng</button>`);

function editEntry(id){ if(!isOwner()) return; formEntry(id); }
async function saveEntry(editId){
  const qty = +$('e_qty').value, cost = $('e_cost')? +$('e_cost').value : 0;
  if(!qty || qty<1){ alert('Nhập số lượng'); return; }
  if(editId){
    const en = db.entries.find(x=>x.id===editId), p = db.products.find(x=>x.id===en.pid);
    if(p){ p.stock += (qty - en.qty); if(cost>0){ p.cost = cost; } }
    en.date = $('e_date').value; en.qty = qty; if(cost>0) en.cost = cost;
  } else {
    const pid = $('e_pid').value, p = db.products.find(x=>x.id===pid);
    p.stock += qty; if(cost>0) p.cost = cost;
    db.entries.push({id:uid(), date:$('e_date').value, pid, qty, cost:cost||p.cost});
  }
  await saveDB(); closeSheet(); render();
}
async function delEntry(id){
  if(!isOwner()) return;
  if(!confirm('Xóa phiếu nhập này? Số lượng đã cộng vào kho sẽ được trừ lại tương ứng.')) return;
  const en = db.entries.find(x=>x.id===id); const p = db.products.find(x=>x.id===en.pid);
  if(p) p.stock -= en.qty;
  db.entries = db.entries.filter(x=>x.id!==id);
  await saveDB(); closeSheet(); render();
}

async function saveUser(id){
  if(id){
    const u = db.users.find(x=>x.id===id), p = $('u_pass').value;
    if(p){ if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; } u.pass = hp(p); }
    await saveDB(); closeSheet(); render(); return;
  }
  const role = $('u_role').value, name = $('u_name').value.trim(), un = $('u_user').value.trim().toLowerCase(), p = $('u_pass').value;
  if(!name||!un||!p){ alert('Điền đủ thông tin'); return; }
  if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; }
  if(db.users.some(x=>x.username===un)){ alert('ID này đã tồn tại'); return; }
  let staffId = '';
  if(role==='sale'){
    if(!db.staff.length){ alert('Chưa có nhân viên sale để gắn.'); return; }
    staffId = $('u_staff').value;
  }
  db.users.push({id:uid(), username:un, pass:hp(p), role, name, staffId});
  await saveDB(); closeSheet(); render();
}
async function delUser(id){
  if(!confirm('Xóa tài khoản đăng nhập này? (Hồ sơ nhân viên và đơn hàng vẫn giữ nguyên)')) return;

  +'<div class="row2"><div><label>Giá trị trước thuế (đ) *</label><input id="vi_pre" type="number" oninput="calcVat()"></div>'
  +'<div><label>Thuế suất</label><select id="vi_pct" onchange="calcVat()"><option value="10">10%</option><option value="8">8%</option><option value="5">5%</option><option value="0">0%</option></select></div></div>'
  +'<div class="tot"><span>Tiền thuế VAT</span><b id="vi_vat">0 đ</b></div>'
  +'<div class="tot grand"><span>Tổng thanh toán</span><b id="vi_tot">0 đ</b></div>'
  +'<label>Ghi chú (mua gì)</label><input id="vi_note" placeholder="VD: 2.000 chai 500ml + tem nhãn">'
  +'<button class="btn" onclick="saveVatIn()">Lưu hóa đơn</button>'
  +'<button class="btn line" onclick="closeSheet()">Đóng</button>');
}
function calcVat(){
  const pre = +$('vi_pre').value||0, pct = +$('vi_pct').value;
  $('vi_vat').textContent = fmt(pre*pct/100); $('vi_tot').textContent = fmt(pre*(1+pct/100));
}
async function saveVatIn(){
  const sup = $('vi_sup').value.trim(), no = $('vi_no').value.trim(), pre = +$('vi_pre').value;
  if(!sup||!no||!pre){ alert('Cần nhà cung cấp, số HĐ và giá trị'); return; }
  const pct = +$('vi_pct').value;
  db.vatIn.push({id:uid(), date:$('vi_date').value, supplier:sup, taxCode:$('vi_tax').value.trim(), invoiceNo:no,
    pretax:pre, vatPct:pct, vatAmt:Math.round(pre*pct/100), total:Math.round(pre*(1+pct/100)), note:$('vi_note').value.trim()});
  await saveDB(); closeSheet(); render();
}
async function delVatIn(id){
  if(!canInvoice()) return;
  if(!confirm('Xóa hóa đơn đầu vào này?')) return;
  db.vatIn = db.vatIn.filter(x=>x.id!==id); await saveDB(); render();
}
function exportVatCSV(){
  if(!canInvoice()) return;
  const rows = [['Ngày','Nhà cung cấp','MST NCC','Số HĐ','Trước thuế','Thuế suất %','Tiền VAT','Tổng','Ghi chú']];
  db.vatIn.forEach(v=>rows.push([v.date, v.supplier, v.taxCode, v.invoiceNo, v.pretax, v.vatPct, v.vatAmt, v.total, v.note]));
  dl('ANVIFA-HDdauvao.csv', rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n'), 'text/csv');
}
function formStaff(id){
  if(!isOwner()){ alert('Chỉ chủ tài khoản.'); return; }
  const s = db.staff.find(x=>x.id===id) || {id:'',name:'',phone:'',pct:5};
  openSheet(`<h2>${id?'Sửa':'➕ Thêm'} nhân viên</h2>
  <label>Tên *</label><input id="s_name" value="${esc(s.name)}">
  <div class="row2"><div><label>SĐT</label><input id="s_phone" value="${esc(s.phone)}"></div>
  <div><label>% hoa hồng / doanh thu</label><input id="s_pct" type="number" step="0.5" value="${s.pct}"></div></div>
  <button class="btn" onclick="saveStaff('${id||''}')">Lưu</button>
  ${id?`<button class="btn danger" onclick="delStaff('${id}')">Xóa</button>`:''}
  <button class="btn line" onclick="closeSheet()">Đóng</button>`);
}
async function saveStaff(id){
  const d = {name:$('s_name').value.trim(), phone:$('s_phone').value.trim(), pct:+$('s_pct').value||0};
  if(!d.name){ alert('Cần tên'); return; }
  if(id) Object.assign(db.staff.find(x=>x.id===id), d); else db.staff.push({id:uid(), ...d});
  await saveDB(); closeSheet(); render();
}
async function delStaff(id){ if(!confirm('Xóa nhân viên?')) return; db.staff = db.staff.filter(x=>x.id!==id); db.users = db.users.filter(u=>u.staffId!==id); await saveDB(); closeSheet(); render(); }
function formPromo(id){
  if(!isOwner()){ alert('Chỉ chủ tài khoản được sửa chương trình.'); return; }
  const p = db.promos.find(x=>x.id===id) || {id:'',name:'',type:'percent',value:10,note:'',active:true};
  openSheet(`<h2>${id?'Sửa':'➕ Thêm'} chương trình</h2>
  <label>Tên chương trình *</label><input id="pr_name" value="${esc(p.name)}" placeholder="VD: Chiết khấu đại lý cấp 1">
  <div class="row2"><div><label>Kiểu giảm</label><select id="pr_type"><option value="percent" ${p.type==='percent'?'selected':''}>Theo %</option><option value="amount" ${p.type==='amount'?'selected':''}>Số tiền cố định</option></select></div>
  <div><label>Giá trị</label><input id="pr_val" type="number" value="${p.value}"></div></div>
  <label>Đang áp dụng?</label><select id="pr_act"><option value="1" ${p.active?'selected':''}>Bật</option><option value="0" ${!p.active?'selected':''}>Tắt</option></select>
  <label>Ghi chú chính sách</label><input id="pr_note" value="${esc(p.note)}" placeholder="VD: đơn từ 10 chai, áp dụng T7-T9">
  <button class="btn" onclick="savePromo('${id||''}')">Lưu</button>
  ${id?`<button class="btn danger" onclick="delPromo('${id}')">Xóa</button>`:''}
  <button class="btn line" onclick="closeSheet()">Đóng</button>`);
}
async function savePromo(id){
  const d = {name:$('pr_name').value.trim(), type:$('pr_type').value, value:+$('pr_val').value||0, active:$('pr_act').value==='1', note:$('pr_note').value.trim()};
  if(!d.name){ alert('Cần tên chương trình'); return; }
  if(id) Object.assign(db.promos.find(x=>x.id===id), d); else db.promos.push({id:uid(), ...d});
  await saveDB(); closeSheet(); render();
}
async function delPromo(id){ if(!confirm('Xóa chương trình?')) return; db.promos = db.promos.filter(x=>x.id!==id); await saveDB(); closeSheet(); render(); }
function formExpense(){
  if(!isOwner()) return;
  openSheet(`<h2>➕ Thêm chi phí</h2>
  <label>Ngày</label><input id="x_date" type="date" value="${today()}">
  <label>Loại chi phí</label><select id="x_type"><option>Lương cứng nhân viên</option><option>Quảng cáo Facebook</option><option>Vật tư đóng gói</option><option>Thuê kho / mặt bằng</option><option>Khác</option></select>
  <label>Số tiền (đ) *</label><input id="x_amt" type="number">
  <label>Ghi chú</label><input id="x_note">
  <button class="btn" onclick="saveExpense()">Lưu chi phí</button>
  <button class="btn line" onclick="closeSheet()">Đóng</button>`);
}
async function saveExpense(){
  const amt = +$('x_amt').value; if(!amt){ alert('Nhập số tiền'); return; }
  db.expenses.push({id:uid(), date:$('x_date').value, type:$('x_type').value, amount:amt, note:$('x_note').value.trim()});
  await saveDB(); closeSheet(); render();
}
async function delExpense(id){ db.expenses = db.expenses.filter(x=>x.id!==id); await saveDB(); render(); }
/* ================= XUAT CSV & SAO LUU ================= */
function dl(name, content, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+content], {type}));
  a.download = name; a.click();
}
function exportCSV(){
  if(!isOwner()) return;
  const rows = [['Mã đơn','Ngày','Khách','SĐT','Địa chỉ','Nhân viên','Sản phẩm','Tiền hàng','Chiết khấu','Khách trả','Giá vốn','Ship','Đóng gói','Hoa hồng','Lợi nhuận','HĐ đỏ','Số HĐ','Trạng thái']];
  db.orders.forEach(o=>{
    const c = db.customers.find(x=>x.id===o.custId)||{}, st = db.staff.find(x=>x.id===o.staffId)||{};
    rows.push([o.code, o.date.slice(0,10), c.name||'', c.phone||'', c.address||'', st.name||'',
      o.items.map(i=>i.name+' x'+i.qty).join('; '), orderSubtotal(o), Math.round(orderDiscount(o)), Math.round(orderRevenue(o)),
      orderCOGS(o), o.ship||0, o.pack||0, o.comm||0, Math.round(orderProfit(o)), o.vatNeed?'Có':'', o.vatNo||'', STATUS[o.status]]);
  });
  dl('ANVIFA-donhang.csv', rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n'), 'text/csv');
}
function backup(){ dl('ANVIFA-saoluu-'+today()+'.json', JSON.stringify(db), 'application/json'); }
function restore(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async () => { try{ const d = JSON.parse(r.result);
    if(!d.products||!d.orders) throw 0;
    if(confirm('Khôi phục sẽ THAY THẾ toàn bộ dữ liệu hiện tại. Tiếp tục?')){ db = d; await saveDB(); render(); } }
    catch(e){ alert('File không hợp lệ'); } };
  r.readAsText(f);
}
window.startApp = loadDB;
</script>

<!-- ======================================================================
     KHO DỮ LIỆU CHUNG (Firebase) — để mọi nhân viên thấy cùng một dữ liệu.
     Cách bật: xem hướng dẫn kèm theo, điền 6 giá trị vào firebaseConfig bên dưới.
     CHƯA điền gì thì app tự chạy bằng bộ nhớ trình duyệt (chỉ 1 máy, để test).
====================================================================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

// ĐIỀN 6 GIÁ TRỊ NÀY TỪ FIREBASE CONSOLE (Project settings → General → Your apps → SDK config)
const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_PROJECT.firebaseapp.com",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE_PROJECT.appspot.com",
  messagingSenderId: "PASTE_SENDER_ID",
  appId: "PASTE_APP_ID"
};

const useFirebase = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PASTE");
let lastPushed = null;

if(useFirebase){
  const app = initializeApp(firebaseConfig);
  const fdb = getFirestore(app);
  const auth = getAuth(app);
  const ref = doc(fdb, "anvifa", "maindb");

  const authReady = new Promise((resolve)=>{
    const unsub = onAuthStateChanged(auth, (u)=>{ if(u){ unsub(); resolve(); } });
    signInAnonymously(auth).catch(err=>{ console.error("Firebase auth lỗi:", err); document.getElementById('sync').textContent='lỗi kết nối!'; });
  });

  window.store = {
    async get(k){
      await authReady;
      const snap = await getDoc(ref);
      if(!snap.exists() || !(k in snap.data())) throw new Error('empty');
      return { value: snap.data()[k] };
    },
    async set(k,v){
      await authReady;
      lastPushed = v;
      await setDoc(ref, { [k]: v }, { merge:true });
      return { key:k };
    }
  };

  authReady.then(()=>{
    window.startApp();
    // Đồng bộ realtime: máy khác lưu xong, app của mình tự cập nhật không cần bấm F5
    onSnapshot(ref, (snap)=>{
      if(!snap.exists()) return;
      const raw = snap.data().anvifa_db;
      if(raw && raw !== lastPushed && window.__applyRemoteDB){
        try{ window.__applyRemoteDB(JSON.parse(raw)); }catch(e){}
      }
    });
  });
} else {
  // Chưa cấu hình Firebase -> chạy tạm bằng bộ nhớ trình duyệt (chỉ 1 máy)
  window.store = {
    async get(k){ const v = localStorage.getItem(k); if(v===null) throw new Error('empty'); return {value:v}; },
    async set(k,v){ localStorage.setItem(k,v); return {key:k}; }
  };
  console.warn('ANVIFA: chưa cấu hình Firebase — dữ liệu chỉ lưu trên máy này. Xem hướng dẫn đi kèm để bật đồng bộ chung.');
  window.startApp();
}
</script>
